  <rect width="1200" height="630" fill="url(#greenGlow)"/>
  <path d="M0 575L1200 532V630H0Z" fill="#001f18" opacity="0.62"/>
  <path d="M44 92L171 92" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(64 64)">
    <circle cx="18" cy="18" r="12" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#softGlow)"/>
    <circle cx="18" cy="18" r="5.5" fill="#05070a" stroke="#bff8ff" stroke-opacity="0.5"/>
    <text x="48" y="25" fill="#ffffff" font-size="28" font-weight="760" font-family="Instrument Sans, Inter, Arial, sans-serif">Internet of Growth</text>
