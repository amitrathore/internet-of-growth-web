<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Internet of Growth preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061b41"/>
      <stop offset="42%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#00271f"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="68%" cy="48%" r="48%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.28"/>
      <stop offset="54%" stop-color="#156cff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="86%" cy="70%" r="42%">
      <stop offset="0%" stop-color="#00b985" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00b985" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="48%" stop-color="#156cff"/>
      <stop offset="100%" stop-color="#00b985"/>
    </linearGradient>
    <linearGradient id="warmAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="48%" stop-color="#f8d84a"/>
      <stop offset="100%" stop-color="#00b985"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M62 0H0V62" fill="none" stroke="#ffffff" stroke-opacity="0.065" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
