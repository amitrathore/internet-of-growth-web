      <rect x="402" y="160" width="130" height="126" rx="18"/>
      <rect x="206" y="0" width="116" height="42" rx="21"/>
      <rect x="382" y="70" width="116" height="42" rx="21"/>
      <rect x="88" y="342" width="116" height="42" rx="21"/>
      <rect x="336" y="342" width="116" height="42" rx="21"/>
    </g>

    <g fill="#ffffff" font-family="Instrument Sans, Inter, Arial, sans-serif" font-weight="760" font-size="16">
