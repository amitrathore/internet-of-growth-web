    <text y="248" fill="#d5dde8" font-size="32" font-weight="520" font-family="Instrument Sans, Inter, Arial, sans-serif">for Direct-to-Consumer brands.</text>
    <text y="310" fill="#ffffff" fill-opacity="0.78" font-size="22" font-weight="650" font-family="Instrument Sans, Inter, Arial, sans-serif">Powered by </text>
    <text x="132" y="310" fill="#ffffff" font-size="22" font-weight="800" font-family="Instrument Sans, Inter, Arial, sans-serif">Outcome Machines</text>
