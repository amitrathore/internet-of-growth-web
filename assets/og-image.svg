      <text x="170" y="254" fill="#ffffff" font-size="34" font-weight="760" font-family="Space Grotesk, Inter, Arial, sans-serif">Decide.</text>
      <text x="170" y="282" fill="#bdc7d4" font-size="18" font-weight="650" font-family="Instrument Sans, Inter, Arial, sans-serif">measure. learn.</text>
    </g>

